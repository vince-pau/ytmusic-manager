<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Hidden Playlists</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            max-width: 700px;
            margin: 48px auto;
            padding: 0 24px;
            background: #0f0f0f;
            color: #e0e0e0;
        }
        .back { color: #666; text-decoration: none; font-size: 0.9rem; }
        .back:hover { color: #fff; }
        h1 { margin: 12px 0 4px; font-size: 1.6rem; }
        .sub { color: #666; margin: 0 0 32px; font-size: 0.9rem; }
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #1e1e1e;
            border-radius: 4px;
        }
        li:hover { background: #1a1a1a; }
        .right { display: flex; align-items: center; gap: 14px; }
        .count { color: #555; font-size: 0.85rem; }
        .title { color: #666; }
        .unhide-btn {
            background: none;
            border: 1px solid #333;
            color: #666;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 3px;
        }
        .unhide-btn:hover { color: #aaa; border-color: #555; }
        .empty { color: #555; margin-top: 24px; }
    </style>
</head>
<body>
    <a class="back" href="/">← All Playlists</a>
    <h1>Hidden Playlists</h1>
    <p class="sub">These playlists are hidden from the main page. Unhide to restore them.</p>

    {% if playlists %}
    <ul>
    {% for pl in playlists %}
        <li>
            <span class="title">{{ pl.title }}</span>
            <span class="right">
                <span class="count">{{ pl.count or '?' }} songs</span>
                <form method="post" action="/unhide-playlist/{{ pl.id }}">
                    <button class="unhide-btn" type="submit">Unhide</button>
                </form>
            </span>
        </li>
    {% endfor %}
    </ul>
    {% else %}
    <p class="empty">No hidden playlists.</p>
    {% endif %}
</body>
</html>
