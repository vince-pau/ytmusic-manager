<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>YT Music Playlist Manager</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            max-width: 700px;
            margin: 48px auto;
            padding: 0 24px;
            background: #0f0f0f;
            color: #e0e0e0;
        }
        h1 { margin: 0 0 4px; font-size: 1.6rem; }
        .sub { color: #666; margin: 0 0 32px; font-size: 0.9rem; }
        .sub a { color: #555; text-decoration: none; }
        .sub a:hover { color: #aaa; }
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #1e1e1e;
            border-radius: 4px;
        }
        li:hover { background: #1a1a1a; }
        a { color: #e0e0e0; text-decoration: none; }
        a:hover { color: #fff; }
        .right { display: flex; align-items: center; gap: 14px; }
        .count { color: #555; font-size: 0.85rem; }
        .hide-btn {
            background: none;
            border: none;
            color: #333;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .hide-btn:hover { color: #888; background: #222; }
    </style>
</head>
<body>
    <h1>YT Music Playlist Manager</h1>
    <p class="sub">
        {{ playlists | length }} playlists &mdash; click one to sort
        &nbsp;|&nbsp; <a href="/duplicates">find duplicates</a>
        {% if hidden_count %}
        &nbsp;|&nbsp; <a href="/hidden">{{ hidden_count }} hidden</a>
        {% endif %}
    </p>
    <ul>
    {% for pl in playlists %}
        <li>
            <a href="/playlist/{{ pl.id }}">{{ pl.title }}</a>
            <span class="right">
                <span class="count">{{ pl.count or '?' }} songs</span>
                <form method="post" action="/hide-playlist/{{ pl.id }}">
                    <button class="hide-btn" type="submit" title="Hide this playlist">✕</button>
                </form>
            </span>
        </li>
    {% endfor %}
    </ul>
</body>
</html>
