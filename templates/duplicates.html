<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Find Duplicates</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            max-width: 700px;
            margin: 48px auto;
            padding: 0 24px;
            background: #0f0f0f;
            color: #e0e0e0;
        }
        .back { color: #666; text-decoration: none; font-size: 0.9rem; }
        .back:hover { color: #fff; }
        h1 { margin: 12px 0 4px; font-size: 1.6rem; }
        .sub { color: #666; margin: 0 0 24px; font-size: 0.9rem; }
        .controls { display: flex; gap: 10px; margin-bottom: 16px; }
        .btn {
            padding: 7px 14px;
            background: #222;
            border: 1px solid #333;
            border-radius: 4px;
            color: #aaa;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .btn:hover { background: #2a2a2a; color: #fff; }
        .btn-find {
            padding: 10px 24px;
            background: #4a9;
            border: none;
            border-radius: 4px;
            color: #000;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-find:hover { background: #5ba; }
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-bottom: 1px solid #1e1e1e;
            border-radius: 4px;
        }
        li:hover { background: #1a1a1a; }
        li label { flex: 1; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        input[type=checkbox] { accent-color: #4a9; width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; }
        .count { color: #555; font-size: 0.82rem; }
        .cached-dot { color: #4a9; font-size: 0.75rem; margin-left: 6px; }
    </style>
</head>
<body>
    <a class="back" href="/">← All Playlists</a>
    <h1>Find Duplicates</h1>
    <p class="sub">Select playlists to scan. <span style="color:#4a9">●</span> = cached (fast). Uncached playlists will be fetched from YouTube.</p>

    <form method="post" action="/duplicates/results">
        <div class="controls">
            <button type="button" class="btn" id="select-all">Select all</button>
            <button type="button" class="btn" id="deselect-all">Deselect all</button>
        </div>
        <ul>
        {% for pl in playlists %}
            <li>
                <input type="checkbox" name="playlist_ids" value="{{ pl.id }}" id="pl-{{ pl.id }}" checked>
                <label for="pl-{{ pl.id }}">
                    <span>
                        {{ pl.title }}
                        {% if pl.cached %}<span class="cached-dot" title="Cached">●</span>{% endif %}
                    </span>
                    <span class="count">{{ pl.count or '?' }} songs</span>
                </label>
            </li>
        {% endfor %}
        </ul>
        <button type="submit" class="btn-find">Find Duplicates</button>
    </form>

    <script>
        document.getElementById('select-all').addEventListener('click', () => {
            document.querySelectorAll('input[name=playlist_ids]').forEach(c => c.checked = true);
        });
        document.getElementById('deselect-all').addEventListener('click', () => {
            document.querySelectorAll('input[name=playlist_ids]').forEach(c => c.checked = false);
        });
    </script>
</body>
</html>
